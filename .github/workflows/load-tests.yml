name: Load Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger with custom target URL
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target base URL (default: http://localhost:3000)'
        required: false
        default: 'http://localhost:3000'
      ws_url:
        description: 'Target WebSocket URL (default: ws://localhost:3000/ws)'
        required: false
        default: 'ws://localhost:3000/ws'

jobs:
  http-load-tests:
    name: HTTP Load Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Ramp-up Test
        run: k6 run scenarios/http-api/ramp-up.js --out json=results/ramp-up.json
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:3000' }}

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results-${{ github.run_id }}
          path: results/
          retention-days: 30
