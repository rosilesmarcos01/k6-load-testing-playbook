name: Load Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'HTTP base URL for CI smoke (paths /public/crocodiles/...)'
        required: false
        default: 'https://test-api.k6.io'

jobs:
  k6-ci-smoke:
    name: k6 CI smoke (live HTTPS)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          set -euo pipefail
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version

      - name: Run CI smoke
        run: |
          mkdir -p results
          k6 run scenarios/http-api/smoke-ci.js --out json=results/smoke-ci.json
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://test-api.k6.io' }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results-${{ github.run_id }}
          path: results/
          retention-days: 30
